<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Cinema - ดูซีรี่ส์และหนังสั้นฟรี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --dance-primary: #6366f1; /* Indigo 600 */
            --dance-secondary: #a855f7; /* Purple 500 */
            --dance-bg: #f8fafc;
            --text-main: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--dance-bg);
            color: var(--text-main);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Modern Card Animation */
        .magic-card {
            background: var(--card-bg);
            border: 1px solid rgba(99, 102, 241, 0.05);
            border-radius: 1.25rem;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            flex: 0 0 auto;
            width: 280px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        @media (max-width: 640px) {
            .magic-card { width: 170px; }
        }

        .magic-card:hover {
            transform: translateY(-12px);
            border-color: var(--dance-primary);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.15);
        }

        .magic-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1.25rem;
            background: linear-gradient(135deg, var(--dance-primary), var(--dance-secondary));
            opacity: 0;
            transition: opacity 0.4s;
            z-index: -1;
            filter: blur(15px);
        }

        .magic-card:hover::after {
            opacity: 0.2;
        }

        /* Slide Control */
        .slide-container {
            display: flex;
            overflow-x: auto;
            gap: 1.5rem;
            padding: 1.5rem 1rem 3rem 1rem;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .slide-container::-webkit-scrollbar { display: none; }
        .magic-card { scroll-snap-align: start; }

        /* Category Pill - Cool Design */
        .cat-pill {
            background: white;
            border: 2px solid transparent;
            color: #64748b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            font-weight: 500;
        }

        .cat-pill:hover, .cat-pill.active {
            background: linear-gradient(135deg, var(--dance-primary), var(--dance-secondary));
            color: white;
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        /* Navbar & Header */
        .nav-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .gradient-text {
            background: linear-gradient(135deg, var(--dance-primary), var(--dance-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="pb-32">

    <!-- Ambient background shapes -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-100/40 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-100/40 rounded-full blur-[120px]"></div>
    </div>

    <!-- Header Section -->
    <header class="sticky top-0 z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-4 py-4 space-y-5">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 cursor-pointer" onclick="goHome()">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-indigo-600 to-purple-500 flex items-center justify-center shadow-lg shadow-indigo-500/30 rotate-3 hover:rotate-0 transition-transform">
                        <i data-lucide="clapperboard" class="text-white w-7 h-7"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter text-slate-800 uppercase italic leading-none">ซีรี่ส์ & หนังสั้น</h1>
                        <p class="text-[10px] tracking-[0.3em] font-bold text-indigo-600 uppercase">PREMIUM FREE STREAMING</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="openFavs()" class="p-3 rounded-2xl bg-slate-100 text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 transition-all border border-transparent hover:border-indigo-200">
                        <i data-lucide="bookmark" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Search Area -->
            <div class="relative w-full group">
                <input type="text" id="search-input" oninput="handleSearch(this.value)"
                       placeholder="ค้นหาซีรี่ส์หรือตอนที่น่าสนใจ..." 
                       class="w-full bg-white border border-slate-200 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all text-slate-800 placeholder-slate-400 shadow-sm">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-indigo-600"></i>
            </div>

            <!-- Modern Category Selector -->
            <div id="category-bar" class="flex overflow-x-auto gap-3 pb-2 scroll-smooth no-scrollbar py-1">
                <!-- JS Inject Pills -->
            </div>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto pt-8">
        <div id="loader" class="flex flex-col items-center justify-center py-40">
            <div class="relative">
                <div class="w-14 h-14 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i data-lucide="play" class="w-5 h-5 text-indigo-600 animate-pulse"></i>
                </div>
            </div>
            <p class="mt-6 text-slate-400 text-sm font-medium tracking-widest animate-pulse">กำลังเตรียมโรงภาพยนตร์ให้คุณ...</p>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
        <div class="bg-white/80 backdrop-blur-2xl px-10 py-4 rounded-3xl flex gap-14 shadow-2xl border border-white/50 ring-1 ring-black/5">
            <button onclick="goHome()" class="flex flex-col items-center text-slate-400 hover:text-indigo-600 transition-all group">
                <i data-lucide="film" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                <span class="text-[10px] mt-1.5 font-bold uppercase tracking-wider">หน้าแรก</span>
            </button>
            <button onclick="openFavs()" class="flex flex-col items-center text-slate-400 hover:text-purple-600 transition-all group">
                <i data-lucide="star" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                <span class="text-[10px] mt-1.5 font-bold uppercase tracking-wider">รายการโปรด</span>
            </button>
        </div>
    </nav>

    <!-- Modal Video Player -->
    <div id="video-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="relative w-full max-w-4xl bg-white rounded-[2.5rem] overflow-hidden shadow-2xl animate-in fade-in zoom-in duration-300">
            <button onclick="closeModal()" class="absolute top-6 right-6 z-[110] bg-white/90 hover:bg-red-500 hover:text-white p-3 rounded-2xl transition-all shadow-lg text-slate-600">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div class="aspect-video bg-black">
                <div id="player-container" class="w-full h-full"></div>
            </div>
            <div class="p-8 md:p-12 text-center bg-gradient-to-b from-white to-slate-50">
                <h2 id="modal-title" class="text-xl md:text-3xl font-bold text-slate-800 mb-8 line-clamp-2 leading-tight">ชื่อตอน</h2>
                <div class="flex justify-center gap-4">
                    <button id="modal-fav-btn" onclick="toggleFavoriteCurrent()" class="px-8 py-4 rounded-2xl font-bold text-sm flex items-center gap-3 transition-all active:scale-95 shadow-xl hover:shadow-indigo-200">
                        <i data-lucide="bookmark" class="w-5 h-5"></i>
                        <span>เก็บไว้ในรายการโปรด</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRKyH-x5lB-fh1uc7ZQfW0BlRaWh2Z2z5DBAuP98ClzC2xmJt4UguP2OnLJRsCrE4j7xiJ4NGt-l9H/pub?output=csv";

        let allVideos = [];
        let currentPlaylist = [];
        let currentIndex = -1;
        let favorites = JSON.parse(localStorage.getItem('cinema_premium_favs') || '[]');
        let currentVideo = null;
        let player = null;

        function extractID(url) {
            if (!url) return null;
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^?&"'>\s]+)/);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        async function fetchVideos() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);

                allVideos = rows.map((row, i) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const cat = (cols[0] || 'ซีรี่ส์ทั่วไป').replace(/"/g, '').trim();
                    const title = (cols[1] || 'ตอนใหม่').replace(/"/g, '').trim();
                    const url = (cols[2] || '').replace(/"/g, '').trim();
                    const vId = extractID(url);
                    return { id: 'cin_'+i, category: cat, title, vId, thumb: vId ? `https://i.ytimg.com/vi/${vId}/mqdefault.jpg` : null };
                }).filter(v => v.vId);

                document.getElementById('loader').classList.add('hidden');
                renderHome();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = '<p class="text-red-500 text-sm font-bold">ไม่สามารถเชื่อมต่อข้อมูลได้ กรุณาลองใหม่อีกครั้ง</p>';
            }
        }

        function renderHome() {
            const container = document.getElementById('main-content');
            const categoryBar = document.getElementById('category-bar');
            if (!container || !categoryBar) return;
            container.innerHTML = '';
            categoryBar.innerHTML = '';

            const groups = allVideos.reduce((acc, video) => {
                acc[video.category] = acc[video.category] || [];
                acc[video.category].push(video);
                return acc;
            }, {});

            Object.entries(groups).forEach(([category, videos], idx) => {
                const jumpBtn = document.createElement('button');
                jumpBtn.className = 'cat-pill px-6 py-2.5 rounded-2xl text-sm transition-all flex items-center gap-2';
                jumpBtn.innerHTML = `<i data-lucide="play" class="w-3.5 h-3.5"></i> ${category}`;
                
                jumpBtn.onclick = (e) => {
                    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    const sectionEl = document.getElementById('section-'+idx);
                    if (sectionEl) {
                        const offset = 180;
                        window.scrollTo({ top: sectionEl.offsetTop - offset, behavior: 'smooth' });
                    }
                };
                categoryBar.appendChild(jumpBtn);

                const section = document.createElement('section');
                section.id = 'section-' + idx;
                section.className = 'mb-12';
                section.innerHTML = `
                    <div class="px-6 flex items-center justify-between mb-2">
                        <h2 class="text-xl md:text-2xl font-bold text-slate-800 flex items-center gap-3">
                            <span class="w-2 h-8 bg-gradient-to-b from-indigo-600 to-purple-500 rounded-full"></span> ${category}
                        </h2>
                        <span class="px-3 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-widest rounded-lg">${videos.length} ตอน</span>
                    </div>
                    <div class="slide-container" id="row-${idx}">
                        ${videos.map((v, i) => renderCard(v, idx, i)).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
            lucide.createIcons();
        }

        function renderCard(v, sectionIdx, videoIdx) {
            return `
                <div class="magic-card group cursor-pointer overflow-hidden" onclick="playFromSection('${v.category.replace(/'/g, "\\'")}', ${videoIdx})">
                    <div class="relative w-full aspect-video overflow-hidden bg-slate-200">
                        <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-indigo-900/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                            <div class="w-14 h-14 bg-white/95 backdrop-blur rounded-full flex items-center justify-center shadow-2xl transform scale-50 group-hover:scale-100 transition-transform duration-300">
                                <i data-lucide="play" class="w-7 h-7 text-indigo-600 fill-indigo-600 translate-x-0.5"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-5">
                        <h3 class="text-[14px] font-semibold text-slate-700 line-clamp-2 leading-snug group-hover:text-indigo-600 transition-colors">
                            ${v.title}
                        </h3>
                    </div>
                </div>
            `;
        }

        function handleSearch(term) {
            const q = term.toLowerCase().trim();
            const container = document.getElementById('main-content');
            if(!q) { renderHome(); return; }

            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(q) || v.category.toLowerCase().includes(q));
            currentPlaylist = filtered;
            
            container.innerHTML = `
                <div class="px-6 mb-12">
                    <h2 class="text-sm text-slate-400 font-bold uppercase tracking-[0.2em] mb-8">ผลการค้นหา: <span class="text-indigo-600">"${term}"</span></h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                        ${filtered.map((v, i) => renderCard(v, 'search', i)).join('')}
                    </div>
                </div>
            `;
            if(filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-32">
                        <i data-lucide="film" class="w-16 h-16 mx-auto mb-6 text-slate-200"></i>
                        <p class="text-slate-400 font-medium">ไม่พบรายการที่คุณต้องการ</p>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function playFromSection(category, index) {
            const sectionVideos = allVideos.filter(v => v.category === category);
            currentPlaylist = sectionVideos;
            playVideo(index);
        }

        function playVideo(i) {
            if (i < 0 || i >= currentPlaylist.length) return;
            currentIndex = i;
            currentVideo = currentPlaylist[i];
            
            document.getElementById('modal-title').textContent = currentVideo.title;
            document.getElementById('video-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            if (!player) {
                player = new YT.Player('player-container', {
                    height: '100%', width: '100%', videoId: currentVideo.vId,
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'origin': window.location.origin },
                    events: { 'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) playNext(); } }
                });
            } else {
                player.loadVideoById(currentVideo.vId);
            }
            updateFavBtn();
        }

        function playNext() {
            if (currentIndex < currentPlaylist.length - 1) playVideo(currentIndex + 1);
            else closeModal();
        }

        function closeModal() {
            document.getElementById('video-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            if (player) player.stopVideo();
        }

        function goHome() {
            closeModal();
            document.getElementById('search-input').value = "";
            renderHome();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleFavoriteCurrent() {
            if (!currentVideo) return;
            const idx = favorites.indexOf(currentVideo.id);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(currentVideo.id);
            localStorage.setItem('cinema_premium_favs', JSON.stringify(favorites));
            updateFavBtn();
        }

        function updateFavBtn() {
            const btn = document.getElementById('modal-fav-btn');
            if (!btn || !currentVideo) return;
            const isFav = favorites.includes(currentVideo.id);
            btn.className = `px-10 py-4 rounded-2xl font-bold text-sm flex items-center gap-3 mx-auto transition-all active:scale-95 shadow-xl ${isFav ? 'bg-indigo-600 text-white shadow-indigo-500/30' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`;
            btn.querySelector('span').textContent = isFav ? 'ลบออกจากรายการโปรด' : 'เก็บไว้ในรายการโปรด';
            lucide.createIcons();
        }

        function openFavs() {
            const list = allVideos.filter(v => favorites.includes(v.id));
            currentPlaylist = list;
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="px-6 mb-12">
                    <h2 class="text-xl font-bold text-indigo-600 uppercase tracking-widest mb-8 flex items-center gap-3">
                        <i data-lucide="star" class="fill-current"></i> รายการที่บันทึกไว้
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                        ${list.map((v, i) => renderCard(v, 'fav', i)).join('')}
                    </div>
                </div>
            `;
            if(list.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-32">
                        <i data-lucide="bookmark" class="w-16 h-16 mx-auto mb-6 text-slate-200"></i>
                        <p class="text-slate-400 font-medium">ยังไม่มีรายการที่บันทึกไว้</p>
                        <button onclick="goHome()" class="mt-6 px-8 py-3 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200">ดูรายการทั้งหมด</button>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        lucide.createIcons();
        window.onload = fetchVideos;
    </script>
</body>
</html>
